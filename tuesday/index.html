<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Choose Your Own Day</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="stage">
    <img id="spread" alt="">
    <div id="text-layer"></div>
    <div id="hotspots"></div>
  </div>
  <nav id="nav-ui">
    <div id="nav-left">
      <button id="btn-back" class="nav-btn" aria-label="Back">
        <img src="_images/Global-Back1.png" alt="">
      </button>
      <button id="btn-menu" class="nav-btn" aria-label="Menu">
        <img src="_images/Global-Menu1.png" alt="">
      </button>
    </div>
    <button id="btn-die" class="nav-btn" aria-label="Randomize color">
      <img src="_images/Global-ColorDie1.png" alt="">
    </button>
  </nav>

  <div id="splash-overlay">
    <h1 id="splash-title">a tuesday</h1>
    <button id="btn-start">Start</button>
  </div>

  <div id="menu-overlay">
    <div id="menu-card">
      <img src="_images/Menu-scrap.png" id="menu-scrap-bg">
      <div id="menu-items">
        <button id="btn-about-project" class="nav-btn menu-item-btn" aria-label="About the project">
          <img src="_images/Menu-AboutProject1.png" alt="">
        </button>
        <button id="btn-about-ann" class="nav-btn menu-item-btn" aria-label="About Ann">
          <img src="_images/Menu-AboutAnn1.png" alt="">
        </button>
      </div>
    </div>
  </div>

  <div id="small-screen-overlay">
    <div id="small-screen-message">
      <img src="_images/Error-receipt.png" id="small-screen-bg">
      <div id="small-screen-content">
        <h2 id="small-screen-header"></h2>
        <p id="small-screen-text"></p>
      </div>
    </div>
  </div>

  <div id="coord-ui">
    <div id="spread-width"></div>
    <div id="coords"></div>
    <button id="coord-toggle">📍 coords: on</button>
  </div>
  <script src="story.js"></script>
  <script src="engine.js"></script>
</body>
</html>
